skills:
  - category: "Kubernetes & Helm"
    description: "Multi-region EKS for large microservice estates: node pools and isolation, Karpenter autoscaling, PDBs, scheduling and capacity tuning, ingress and routing, and production-grade health checks. Packages and operates workloads with Helm; strong day-to-day cluster ownership."

  - category: "AWS (platform focus)"
    description: "Core services behind reliable delivery: EKS, EC2, ALB, S3, IAM, EBS/EFS, networking and security patterns for services, and multi-account patterns for tooling. Bottlerocket, EBS snapshots, and image prefetch where they shorten node bring-up and stabilize pulls (including ECR migration patterns). AWS Batch and small CLI utilities for operational cleanup and partner pipeline provisioning where the platform owns that glue."

  - category: "CI/CD, GitOps & IaC"
    description: "Jenkins as a shared platform on Kubernetes (agents across clusters, ingress, SSO hooks, build and queue tuning). Argo CD–style promotions with image scan and policy gates before environments advance. Terraform for modules and automated plan/apply; Pulumi on team-standard stacks; Bitbucket Pipelines where teams already use them."

  - category: "Governed infrastructure & data changes"
    description: "Jira-linked Terraform workflows with stored plans (e.g. S3), Slack visibility, and safe cancellation so applies match approvals and windows. Liquibase-driven Snowflake changes with PR checks, CODEOWNERS, and CI so schema stays auditable."

  - category: "Observability, reliability & cost"
    description: "New Relic including NRQL, plus dashboards tied to deploys, PRs, and releases. Kubecost and usage signals for rightsizing and spend awareness. Custom log and ALB tooling, alerting, and ingress health patterns (including gRPC) to catch failures early."

