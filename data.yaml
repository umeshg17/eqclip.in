    description: "Python, Bash, and boto3 for pipelines, glue services, and AWS automation—including Slack workflows for guarded deploys and agent-style helpers (LangGraph, MCP) for fast cross-account lookups in incidents. Go-to support for CI design, onboarding, and production debugging across teams."

  - category: "Data platforms (supporting depth)"
