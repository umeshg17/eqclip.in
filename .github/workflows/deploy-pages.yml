name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_run:
    workflows: ["Fetch LeetCode Rank Daily"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache-bust data-loader.js for CDN/browsers
        run: |
          SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          sed -i "s|src=\"data-loader.js\"|src=\"data-loader.js?v=${SHORT}\"|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
